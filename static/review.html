<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <title>Power review</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        table,
        th,
        td {
            border: 1px solid black;
        }

        td {
            text-align: center;
        }

        body {
            font-family: Verdana, Geneva, Arial, sans-serif;
            font-size: 16px;
        }

        .container {
            display: grid;
        }

        #reviewPlot {
            min-height: 400px;
            height: 100%;
        }
    </style>
</head>

<body>
    <script src="spin.js/spin.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-basic-2.34.0.min.js" integrity="sha384-WVtorik8HNPGic8plr5gN6J45QTzNmkiph2OSK3P6qNliHNn9J90jIC1b9FfvY9q" crossorigin="anonymous"></script>
    <div class="container">
        <div>Select date&nbsp;
            <input type="date" id="dateInput" name="dateInput" onchange="loadData()">
            <button onclick="loadData()">load</button>
            Status: <span id="connection_status">unknown</span>
        </div>
        <div id="reviewPlot"></div>
        <table style="width:100%;">
            <tr>
                <th colspan="4">Power review</th>
            </tr>
            <tr>
                <td style="width: 30%">Consumed</td>
                <td style="width: 20%"><span id="energyConsumed"></span>&nbsp;kWh</td>
                <td style="width: 30%">Produced</td>
                <td style="width: 20%"><span id="energyProduced"></span>&nbsp;kWh</td>
            </tr>
            <tr>
                <td>Missing</td>
                <td><span id="energyMissing"></span>&nbsp;kWh</td>
                <td>From battery</td>
                <td><span id="energyBattery"></span>&nbsp;kWh</td>
            </tr>
            <tr class="meterAvailable" style="display: none;">
                <th colspan="4">Electricity meter</th>
            </tr>
            <tr class="meterAvailable" style="display: none;">
                <td>Consumed</td>
                <td><span id="energyMeterConsumed"></span>&nbsp;kWh</td>
                <td>Produced</td>
                <td><span id="energyMeterProduced"></span>&nbsp;kWh</td>
            </tr>
        </table>
        <p><a href="index.html">live data</a></p>
    </div>
    <script>
        // Constants
        const DEFAULT_POWER_RANGE = 200;
        const MIN_DATE = "2023-08-13";

        // Cache DOM elements (will be initialized after DOM is loaded)
        const elements = {
            reviewPlot: null,
            dateInput: null,
            connectionStatus: null,
            energyConsumed: null,
            energyProduced: null,
            energyMissing: null,
            energyBattery: null,
            energyMeterConsumed: null,
            energyMeterProduced: null
        };

        // Initialize DOM element references
        function initializeElements() {
            elements.reviewPlot = document.getElementById('reviewPlot');
            elements.dateInput = document.getElementById('dateInput');
            elements.connectionStatus = document.getElementById('connection_status');
            elements.energyConsumed = document.getElementById('energyConsumed');
            elements.energyProduced = document.getElementById('energyProduced');
            elements.energyMissing = document.getElementById('energyMissing');
            elements.energyBattery = document.getElementById('energyBattery');
            elements.energyMeterConsumed = document.getElementById('energyMeterConsumed');
            elements.energyMeterProduced = document.getElementById('energyMeterProduced');
        }

        function toggle_by_class(cls, on) {
            const elements = document.getElementsByClassName(cls);
            for (let i = 0; i < elements.length; i++) {
                elements[i].style.display = on ? '' : 'none';
            }
        }

        function createLayout(hasPriceData) {
            const baseLayout = {
                margin: {
                    t: 30,
                    r: hasPriceData ? 45 : 5,
                    b: 5,
                    l: 40
                },
                xaxis: {
                    automargin: true,
                    tickangle: 0,
                    type: 'date',
                },
                yaxis: {
                    range: [0, DEFAULT_POWER_RANGE],
                    title: {
                        text: "power / W"
                    }
                },
                legend: {
                    yanchor: "top",
                    y: 0.99,
                    xanchor: "left",
                    x: 0.01
                },
                hovermode: "x unified"
            };

            // Only add second y-axis if price data is present
            if (hasPriceData) {
                baseLayout.yaxis2 = {
                    title: {
                        text: "price / €",
                    },
                    overlaying: 'y',
                    side: 'right'
                };
            }

            return baseLayout;
        }

        const config = {
            modeBarButtonsToRemove: [
                'select2d', 'lasso2d', 'toggleSpikelines', 'zoomIn2d',
                'zoomOut2d', 'hoverClosestCartesian', 'hoverCompareCartesian'
            ],
            displaylogo: false,
            responsive: true,
            displayModeBar: true
        };

        const spinner = new Spinner();

        function refreshPlot(data) {
            const hasPriceData = data.price != null;
            const layout = createLayout(hasPriceData);
            layout.yaxis.range = [0, data.plot_limit];

            const plotData = [
                {
                    hovertemplate: '%{y} W',
                    line: {
                        color: '#0055ff',
                        shape: 'hv',
                        width: 0
                    },
                    mode: 'lines',
                    name: '🔌→🏠',
                    stackgroup: 'consumer',
                    x: data.consumer_power.utc_ms,
                    y: data.consumer_power.values,
                    type: 'scatter'
                },
                {
                    hovertemplate: '%{y} W',
                    line: {
                        color: '#008800',
                        shape: 'hv',
                        width: 0
                    },
                    mode: 'lines',
                    name: '☀️→🔌',
                    stackgroup: 'producer',
                    x: data.producer_power.utc_ms,
                    y: data.producer_power.values,
                    type: 'scatter'
                }
            ];

            if (data.battery_power != null) {
                plotData.push({
                    hovertemplate: '%{y} W',
                    line: {
                        color: '#ffcc00',
                        shape: 'hv',
                        width: 0
                    },
                    mode: 'lines',
                    name: '🔋→🔌',
                    stackgroup: 'producer',
                    x: data.battery_power.utc_ms,
                    y: data.battery_power.values,
                    type: 'scatter'
                });
            }

            if (hasPriceData) {
                plotData.push({
                    mode: 'lines',
                    name: '💰→🔌',
                    hovertemplate: '%{y:.2f} €',
                    line: {
                        color: '#ff0000',
                        shape: 'hv',
                        dash: 'dot'
                    },
                    yaxis: 'y2',
                    x: data.price.utc_ms,
                    y: data.price.values,
                    type: 'scatter'
                });
            }

            Plotly.react("reviewPlot", plotData, layout, config);
        }

        function refreshTable(data) {
            elements.energyConsumed.innerHTML = parseFloat(data.consumer_energy || 0).toFixed(2);
            elements.energyProduced.innerHTML = parseFloat(data.producer_energy || 0).toFixed(2);
            elements.energyMissing.innerHTML = parseFloat(data.missing_energy || 0).toFixed(2);
            elements.energyBattery.innerHTML = parseFloat(data.battery_energy || 0).toFixed(2);

            if (data.meter_consumption_day == null) {
                toggle_by_class("meterAvailable", false);
            } else {
                toggle_by_class("meterAvailable", true);
                elements.energyMeterProduced.innerHTML = parseFloat(data.meter_production_day).toFixed(2);
                elements.energyMeterConsumed.innerHTML = parseFloat(data.meter_consumption_day).toFixed(2);
            }
        }

        async function loadData() {
            spinner.spin(elements.reviewPlot);
            const date = elements.dateInput.value.split("-").join("");
            
            try {
                const response = await fetch(`/api/review/day?date=${date}`, {
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    console.log(data);
                    refreshPlot(data);
                    refreshTable(data);
                    elements.connectionStatus.innerHTML = `Data received for ${data.date}`;
                } else if (response.status === 401) {
                    const data = await response.json();
                    elements.connectionStatus.innerHTML = data.detail;
                    const emptyLayout = createLayout(false);
                    Plotly.react("reviewPlot", [], emptyLayout, config);
                    refreshTable({
                        consumer_energy: 0,
                        producer_energy: 0,
                        missing_energy: 0,
                        battery_energy: 0
                    });
                } else {
                    elements.connectionStatus.innerHTML = "communication problem";
                    console.error(`${response.status}: ${await response.text()}`);
                    const emptyLayout = createLayout(false);
                    Plotly.react("reviewPlot", [], emptyLayout, config);
                    refreshTable({
                        consumer_energy: 0,
                        producer_energy: 0,
                        missing_energy: 0,
                        battery_energy: 0
                    });
                }
            } catch (error) {
                elements.connectionStatus.innerHTML = "connection failed";
                console.error('Fetch error:', error);
                const emptyLayout = createLayout(false);
                Plotly.react("reviewPlot", [], emptyLayout, config);
                refreshTable({
                    consumer_energy: 0,
                    producer_energy: 0,
                    missing_energy: 0,
                    battery_energy: 0
                });
            } finally {
                elements.dateInput.max = new Date().toISOString().split("T")[0];
                spinner.stop();
            }
        }

        // Initialize date input constraints
        initializeElements();
        elements.dateInput.min = MIN_DATE;
        elements.dateInput.max = new Date().toISOString().split("T")[0];
    </script>
</body>

</html>
